name: Bug report
description: Report something that isn't working correctly in Perfect Cup.
title: "[Bug]: "
labels:
  - Bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug in Perfect Cup!  
        Please fill out the details below as completely as possible.

  - type: input
    id: summary
    attributes:
      label: Short summary
      description: Briefly describe the problem.
      placeholder: E.g., "Crash when saving a new brew"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A concise explanation of what went wrong.
      placeholder: Describe what you were trying to do and what happened.
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to reproduce
      description: Step-by-step instructions so we can reproduce the issue.
      placeholder: |
        1. Go to ...
        2. Tap/Click on ...
        3. Scroll/Interact with ...
        4. See the error
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
      placeholder: The app should...
    validations:
      required: true

  - type: textarea
    id: actual_behavior
    attributes:
      label: Actual behavior
      description: What actually happened, including any error messages.
      placeholder: The app actually...
    validations:
      required: true

  - type: input
    id: device_model
    attributes:
      label: Device model
      description: E.g., iPhone 14, Pixel 7, etc.
      placeholder: iPhone 14
    validations:
      required: true

  - type: input
    id: os_version
    attributes:
      label: OS version
      description: E.g., iOS 17.2, Android 14
      placeholder: iOS 17.2
    validations:
      required: true

  - type: input
    id: app_version
    attributes:
      label: Perfect Cup app version
      description: The version of Perfect Cup you're using.
      placeholder: 1.2.0
    validations:
      required: true

  - type: input
    id: network_conditions
    attributes:
      label: Network conditions
      description: How you were connected when the issue occurred.
      placeholder: Wi-Fi / cellular / offline
    validations:
      required: false

  - type: textarea
    id: media
    attributes:
      label: Screenshots / screen recording
      description: Paste links or drag-and-drop images/video that show the issue.
      placeholder: Attach screenshots or a short screen recording here.
    validations:
      required: false

  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: Any extra information that might help us (e.g., how often it happens).
      placeholder: Happens every time I...
    validations:
      required: false
